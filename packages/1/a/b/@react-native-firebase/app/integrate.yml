preInfo:
  title: Welcome to the @react-native-firebase/app integration.
  message: |-
    On the next prompt, you will be asked to select platforms to integrate.
    Please make sure you create a firebase project at https://console.firebase.google.com/
    and download google-services.json and/or GoogleService-Info.plist files.
steps:
  - task: prompt
    actions:
      - name: platform
        text: "Select platforms to integrate:"
        type: multiselect
        options:
          - value: android
          - value: ios
        required: true
  - task: fs
    label: Importing google-services.json
    when:
      platform: android
    actions:
      - copyFile: google-services.json
        destination: android/app/google-services.json

  - task: build_gradle
    label: Adding classpath to build.gradle
    when:
      platform: android
    actions:
      - block: buildscript.dependencies
        before: //
        append: classpath 'com.google.gms:google-services:4.4.2'

  - task: build_gradle
    label: Adding plugin execution to app/build.gradle
    when:
      platform: android
    location: app
    actions:
      - after: com.android.application
        prepend: "apply plugin: 'com.google.gms.google-services'"

  - task: xcode
    label: Importing GoogleService-Info.plist
    when:
      platform: ios
    actions:
      - addFile: GoogleService-Info.plist
        target: root

  - task: app_delegate
    label: Adding initialization to App Delegate
    lang: objc
    when:
      platform: ios
      RN_VERSION:
        minor:
          $lt: 77
    actions:
      - prepend: "#import <Firebase.h>"
      - block: didFinishLaunchingWithOptions
        prepend: "[FIRApp configure];"

  - task: app_delegate
    label: Adding initialization to App Delegate
    lang: swift
    when:
      platform: ios
      RN_VERSION:
        minor:
          $gte: 77
    actions:
      - prepend: "import Firebase"
      - block: didFinishLaunchingWithOptions
        prepend: "FirebaseApp.configure()"

  - task: podfile
    label: Configuring CocoaPods for Firebase (static frameworks)
    when:
      platform: ios
    actions:
      - prepend: "$RNFirebaseAsStaticFramework = true"
      # Build Firebase as static frameworks WITHOUT forcing a global `use_frameworks!`.
      # On the New Architecture the prebuilt React-Core is non-modular, so
      # `use_frameworks!` makes RNFBApp/RNFBAnalytics compile as framework modules that
      # then fail to import React headers (e.g. "declaration of 'RCTBridgeModule' must be
      # imported from module 'RNFBApp'"). Instead, opt Firebase's Swift-pod ObjC
      # dependency (GoogleUtilities) into modular headers so FirebaseCoreInternal can
      # import it under the default static-library linkage.
      - block: target
        ifNotPresent: "pod 'GoogleUtilities', :modular_headers => true"
        prepend: "pod 'GoogleUtilities', :modular_headers => true"
      - disableFlipper: true
    postInfo: Podfile was changed, do not forget to run `pod install` after integration.
